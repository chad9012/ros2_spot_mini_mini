/**/controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

/**/joint_trajectory_controller:
  ros__parameters:
    joints:
      - motor_front_left_hip
      - motor_front_left_upper_leg
      - motor_front_left_lower_leg
      - motor_front_right_hip
      - motor_front_right_upper_leg
      - motor_front_right_lower_leg
      - motor_back_left_hip
      - motor_back_left_upper_leg
      - motor_back_left_lower_leg
      - motor_back_right_hip
      - motor_back_right_upper_leg
      - motor_back_right_lower_leg

    command_interfaces:
      - effort

    state_interfaces:
      - position
      - velocity

    allow_nonzero_velocity_at_trajectory_end: false

    gains:
      motor_front_left_hip:        {p: 180.0, d: 0.9, i: 20.0}
      motor_front_left_upper_leg:  {p: 180.0, d: 0.9, i: 20.0}
      motor_front_left_lower_leg:  {p: 180.0, d: 0.9, i: 20.0}
      motor_front_right_hip:       {p: 180.0, d: 0.9, i: 20.0}
      motor_front_right_upper_leg: {p: 180.0, d: 0.9, i: 20.0}
      motor_front_right_lower_leg: {p: 180.0, d: 0.9, i: 20.0}
      motor_back_left_hip:         {p: 180.0, d: 0.9, i: 20.0}
      motor_back_left_upper_leg:   {p: 180.0, d: 0.9, i: 20.0}
      motor_back_left_lower_leg:   {p: 180.0, d: 0.9, i: 20.0}
      motor_back_right_hip:        {p: 180.0, d: 0.9, i: 20.0}
      motor_back_right_upper_leg:  {p: 180.0, d: 0.9, i: 20.0}
      motor_back_right_lower_leg:  {p: 180.0, d: 0.9, i: 20.0}

/**/joint_state_broadcaster:
  ros__parameters: {}